    <!-- Scripts -->
    <script>
        // Load products into cards
        function loadProducts() {
            const container = document.getElementById('view-products');
            container.innerHTML = '<p class="col-span-full text-center text-gray-500">Loading products...</p>';

            fetch('api/products.php')
                .then(res => res.json())
                .then(data => {
                    container.innerHTML = '';
                    data.forEach(item => {
                        const card = document.createElement('div');
                        card.className = 'bg-white rounded-xl shadow-sm border border-gray-100 p-5 hover:shadow-md transition-shadow';
                        card.innerHTML = `
                            <h3 class="text-lg font-semibold text-gray-800 mb-2">${item.name}</h3>
                            <p class="text-sm text-gray-500 mb-1">SKU: ${item.sku}</p>
                            <p class="text-sm text-gray-500 mb-1">Category: ${item.cat}</p>
                            <p class="text-sm text-gray-500 mb-1">Stock: ${item.stock} ${item.uom}</p>
                            <p class="text-sm font-medium text-gray-800">Price: ${item.price}</p>
                        `;
                        container.appendChild(card);
                    });
                })
                .catch(err => {
                    container.innerHTML = '<p class="col-span-full text-center text-red-500">Failed to load products.</p>';
                    console.error(err);
                });
        }

        // Sidebar navigation handler
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', e => {
                e.preventDefault();
                const view = btn.getAttribute('data-view');

                // Hide all sections
                document.querySelectorAll('.view-section').forEach(v => v.classList.add('hidden'));
                document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));

                // Show selected section
                const activeView = document.getElementById(`view-${view}`);
                if (activeView) {
                    activeView.classList.remove('hidden');
                    activeView.classList.add('active');

                    if (view === 'products') loadProducts();
                }

                // Update active nav button
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });
    </script>
